version: 1.0
runtime: docker

run:
  network:
    port: 8000
    env: PORT
  env:
    - name: APP_ENV
      value: production
    - name: APP_DEBUG
      value: "false"
    - name: OCTANE_SERVER
      value: frankenphp
    - name: LOG_CHANNEL
      value: stderr
    - name: LOG_LEVEL
      value: error
    - name: DB_CONNECTION
      value: pgsql
    - name: DB_PORT
      value: "5432"
    - name: SESSION_DRIVER
      value: redis
    - name: QUEUE_CONNECTION
      value: redis
    - name: CACHE_STORE
      value: redis
    - name: BROADCAST_CONNECTION
      value: reverb
    - name: REDIS_CLIENT
      value: phpredis
    - name: REDIS_PORT
      value: "6379"
    - name: FILESYSTEM_DISK
      value: s3
    - name: AWS_DEFAULT_REGION
      value: us-west-2
    - name: AWS_BUCKET
      value: awsbuilderapp
    - name: AWS_URL
      value: https://awsbuilderapp.s3.us-west-2.amazonaws.com
    - name: REVERB_PORT
      value: "8080"
    - name: REVERB_SCHEME
      value: https
  # Los valores sensibles se configuran en App Runner Console → Environment variables:
  #   APP_KEY, APP_URL, SESSION_DOMAIN
  #   DB_HOST, DB_DATABASE, DB_USERNAME, DB_PASSWORD
  #   REDIS_HOST, REDIS_PASSWORD
  #   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY  (o usar IAM role)
  #   REVERB_APP_ID, REVERB_APP_KEY, REVERB_APP_SECRET
  #   MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD, MAIL_FROM_ADDRESS
  health-check:
    protocol: HTTP
    path: /api/health
    interval: 10
    timeout: 5
    healthy-threshold: 1
    unhealthy-threshold: 3
