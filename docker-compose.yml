services:
  # Laravel Octane (FrankenPHP) - Development
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    container_name: eventflow-app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"   # Octane
      - "5173:5173"   # Vite dev server
      - "8080:8080"   # Reverb WebSocket
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    networks:
      - eventflow

  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: eventflow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: eventflow
      POSTGRES_USER: eventflow
      POSTGRES_PASSWORD: eventflow_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eventflow

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: eventflow-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eventflow

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: eventflow-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: eventflow
      MINIO_ROOT_PASSWORD: eventflow_secret
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - eventflow

  # Mailpit (local email testing)
  mailpit:
    image: axllent/mailpit:latest
    container_name: eventflow-mailpit
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    networks:
      - eventflow

  # Nginx (reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: eventflow-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - eventflow

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  eventflow:
    driver: bridge
